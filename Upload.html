  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const uploadButton = document.querySelector(".upload-button");
      const reloadButton = document.querySelector(".reload-button");
      const saveButton = document.querySelector(".save-button");
      const cancelButton = document.querySelector(".cancel-button");
      const uploadStatus = document.getElementById("uploadStatus");
      const fileInput = document.getElementById("xmlFile");

      uploadButton.addEventListener("click", function() {
        const file = fileInput.files[0];

        if (!file) {
          alert("No file selected. Please choose an XML file.");
          return;
        }

        const reader = new FileReader();

        reader.onload = function(event) {
          // Simulating successful upload
          uploadStatus.textContent = "Successfully Loaded";
          alert("File successfully loaded.");
          const xmlData = event.target.result;
          localStorage.setItem("xmlData", xmlData); // Save XML data to local storage
        };

        reader.onerror = function(event) {
          // Simulating failed upload
          uploadStatus.textContent = "Not Loaded";
          alert("Error occurred while loading the file. Please try again or check the file format.");
        };

        reader.readAsText(file);
      });

      reloadButton.addEventListener("click", function() {
        const file = fileInput.files[0];

        if (!file) {
          alert("No file selected. Please choose an XML file.");
          return;
        }

        const reader = new FileReader();

        reader.onload = function(event) {
          // Simulating successful reload
          uploadStatus.textContent = "Successfully Loaded";
          alert("XML file reloaded successfully.");
          const xmlData = event.target.result;
          localStorage.setItem("xmlData", xmlData); // Save XML data to local storage
        };

        reader.onerror = function(event) {
          // Simulating failed reload
          uploadStatus.textContent = "Not Loaded";
          alert("Error occurred while reloading the file. Please try again or check the file format.");
        };

        reader.readAsText(file);
      });

      saveButton.addEventListener("click", function() {
        const xmlData = localStorage.getItem("xmlData");

        if (!xmlData) {
          alert("No XML data loaded yet. Please upload an XML file first.");
          return;
        }

        alert("XML file has been saved.");
      });

      cancelButton.addEventListener("click", function() {
        // Reset file input value
        fileInput.value = null;
        // Reset upload status
        uploadStatus.textContent = "";
        // Remove XML data from local storage
        localStorage.removeItem("xmlData");
      });
    });
  </script>
