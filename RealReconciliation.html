<h1>Reconciliation Page</h1>

<form id="reconciliationForm">
  <label for="selectedCompany">Select Company:</label>
  <select id="selectedCompany" name="selectedCompany" required>
    <option value="">Select a Company</option>
    <option value="Company A">Walamoo Inc</option>
    <option value="Company B">Company Inc</option>
    <option value="Company C">Food Fashion Inc</option>
    <option value="Company D">Company D</option>
    <option value="Company E">Company E</option>
    <option value="Company F">Company F</option>
    <option value="Company G">Company G</option>
    <option value="Company H">Company H</option>
    <option value="Company I">Company I</option>
    <option value="Company J">Company J</option>
  </select>
  <label for="totalDeposits">Total Value Deposited:</label>
  <input type="number" id="totalDeposits" name="totalDeposits" required>
  <button type="submit">Calculate</button>
</form>

<div id="result"></div>
<div class="back-button">
           
            <a href="home.html">Back to Home</a>
        </div>
<a href="HelpCenter.html" class="help-link">Help?</a>
<script>
document.getElementById("reconciliationForm").addEventListener("submit", function(event) {
    event.preventDefault();
    var selectedCompany = document.getElementById("selectedCompany").value;
    var totalDeposits = parseFloat(document.getElementById("totalDeposits").value);
    
    // Dummy data
    var companiesData = {
      "Company A": 500,
      "Company B": 800,
      "Company C": 300,
      "Company D": 1200,
      "Company E": 600,
      "Company F": 400,
      "Company G": 1000,
      "Company H": 700,
      "Company I": 900,
      "Company J": 1100
    };

    var totalTaxesPaid = companiesData[selectedCompany];
    var difference = totalTaxesPaid - totalDeposits;

    var result = document.getElementById("result");
    result.innerHTML = "";

    if (isNaN(totalTaxesPaid)) {
      result.innerHTML = "<p>Please select a valid company.</p>";
    } else {
      if (difference === 0) {
        result.innerHTML = "<p>No difference found. Reconciliation successful!</p>";
      } else {
        result.innerHTML = "<p>Difference found: " + difference.toFixed(2) + "</p>";
      }
    }
  });
</script>
