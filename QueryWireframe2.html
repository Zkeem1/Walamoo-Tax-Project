<h1>Enter Query:</h1>
<input type="text" id="queryInput" placeholder="Enter your query here...">

<div class="dropdowns">
  <label for="language">Language:</label>
  <select id="language">
    <option value="english">English</option>
    <option value="dfl">DFL</option>
  </select>
  
  <label for="queryType">Query Type:</label>
  <select id="queryType">
    <option value="adHoc">Ad Hoc</option>
    <option value="guided">Guided</option>
  </select>
</div>

<button id="executeOverwriteBtn">Execute Overwrite</button>
<button id="executeQueryBtn">Execute Query</button>
<button id="printToFileBtn">Print to Text File</button>
<a href="HelpCenter.html" class="help-link">Help?</a>
<p>Query Results:</p>
<div id="queryResults"></div>
<div class="back-button">
          
            <a href="Home.html">Back to Home</a>
        </div>
<script>
  document.getElementById('executeOverwriteBtn').addEventListener('click', function() {
    alert('Execute Overwrite button clicked');
  });
  
  document.getElementById('executeQueryBtn').addEventListener('click', function() {
    executeQuery();
  });
  
  document.getElementById('printToFileBtn').addEventListener('click', function() {
    printResultsToFile();
  });

  function executeQuery() {
    var queryInput = document.getElementById('queryInput').value;
    var queryType = document.getElementById('queryType').value;
    var queryResults = document.getElementById('queryResults');

    // Check if DFL language is selected
    if (document.getElementById('language').value === "dfl") {
        if (queryType === "adHoc") {
            // Generate random binary numbers
            var binaryNumbers = [];
            for (var i = 0; i < 5; i++) {
                binaryNumbers.push(Math.floor(Math.random() * 2));
            }
            queryResults.innerText = binaryNumbers.join(' ');
        }
    } else {
        // Simulating backend data retrieval and sorting
        var records = [
            { companyName: "Company A", companyId: "A123", streetName: "123 Street", city: "City A", country: "Country A", totalTaxesPaid: 1000 },
            { companyName: "Company B", companyId: "B456", streetName: "456 Street", city: "City B", country: "Country B", totalTaxesPaid: 1500 },
            { companyName: "Company C", companyId: "C789", streetName: "789 Street", city: "City C", country: "Country C", totalTaxesPaid: 1200 }
        ];
        
        // Sorting records based on query
        if (queryType === "guided") {
            if (queryInput.toLowerCase() === "list by company name") {
                records.sort((a, b) => a.companyName.localeCompare(b.companyName));
            } else if (queryInput.toLowerCase() === "list by total taxes paid") {
                records.sort((a, b) => a.totalTaxesPaid - b.totalTaxesPaid);
            } else if (queryInput.toLowerCase() === "list by country") {
                records.sort((a, b) => a.country.localeCompare(b.country));
            }
        }
        
        // Displaying sorted records
        queryResults.innerHTML = "";
        records.forEach(function(record) {
            queryResults.innerHTML += `${record.companyName} ${record.companyId} ${record.streetName} ${record.city} ${record.country} ${record.totalTaxesPaid}<br>`;
        });
        
        // Displaying date, time, and total records
        var currentDate = new Date().toLocaleDateString();
        var currentTime = new Date().toLocaleTimeString();
        var totalRecords = records.length;
        queryResults.innerHTML += `<br>Date: ${currentDate}<br>Time: ${currentTime}<br>Total Records: ${totalRecords}`;
    }
}

function printResultsToFile() {
    var queryResultsContent = document.getElementById('queryResults').innerText;
    var blob = new Blob([queryResultsContent], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    
    var a = document.createElement('a');
    a.href = url;
    a.download = 'query_results.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
