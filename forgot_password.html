<!DOCTYPE html>
<html>
<head>
    <title>ProjectB</title>
    <!--Including external stylesheet-->
    <link rel="stylesheet" type="text/css" href="password.css">
</head>
<body>
    <div class="image-container">
        <img src="forgot-password.jpg" alt="Forgot Password">
    </div>

    <div class="container">
        <!-- Login Form -->
        <form id="resetPasswordForm" action="#">
            <h1>Forgot Password?</h1>
            <h2>Enter your email and we’ll send you a link to reset your password.</h2>

            <!-- Email Input -->
            <label>Email Address</label>
            <input type="email" id="email" name="email" placeholder="Email Address" required><br>

            <!-- New Password Input -->
            <div id="newPasswordInput">
                <label>New Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="resetButton">Reset Password</button>

            <!-- Back to Login Link -->
            <div class="links">
                <a href="login.html">Back to Login</a>
            </div>
        </form>

        <!-- Popup Message -->
        <div id="resetPasswordMessage" class="popup-message" style="display: none;">
            <p>Password reset successful!</p>
        </div>
    </div>

    <script>
        document.getElementById("resetPasswordForm").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent default form submission

            var email = document.getElementById("email").value;
            var newPassword = document.getElementById("newPassword").value;

            // Check if the entered email matches the one entered during registration
            var registeredEmail = localStorage.getItem("email");

            if (email === registeredEmail) {
                // Save new password to local storage
                localStorage.setItem("password", newPassword);

                // Display success message
                document.getElementById("resetPasswordMessage").style.display = "block";

                // Reset form fields
                document.getElementById("email").value = "";
                document.getElementById("newPassword").value = "";
            } else {
                // If email doesn't match, show error message
                alert("Invalid email address! Please enter the email address used during registration.");
            }
        });
    </script>

</body>
</html>
