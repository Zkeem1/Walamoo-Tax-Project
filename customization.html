  <h2>Customize Settings</h2>
  <form id="settingsForm">
    <label for="fontColor">Font Color:</label>
    <select id="fontColor" name="fontColor">
      <option value="black">Black</option>
      <option value="green">Green</option>
      <option value="blue">Blue</option>
    </select>
    
    <label for="fontSize">Font Size:</label>
    <input type="text" id="fontSize" name="fontSize" placeholder="Enter font size in pixels">
    
    <label for="fontStyle">Font Style:</label>
    <select id="fontStyle" name="fontStyle">
      <option value="Arial">Arial</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Courier New">Courier New</option>
      <!-- Add more font options as needed -->
    </select>
    
    <label for="languageWidth">Digital Frequency Language Width:</label>
    <select id="languageWidth" name="languageWidth">
      <option value="wide">Wide</option>
      <option value="standard">Standard</option>
    </select>
    
    <input type="checkbox" id="popUpAlerts" name="popUpAlerts">
    <label for="popUpAlerts">Enable Pop-up Alerts</label>
    
    <input type="checkbox" id="permanentChanges" name="permanentChanges">
    <label for="permanentChanges">Make Changes Permanent</label>
    
    <button type="button" onclick="applyChanges()">Apply Changes</button>
    
    <!-- Toggle button for dark mode -->
    <button type="button" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    
  </form>

<script>
  // Function to apply changes
  function applyChanges() {
    var fontColor = document.getElementById("fontColor").value;
    var fontSize = document.getElementById("fontSize").value;
    var fontStyle = document.getElementById("fontStyle").value;
    var languageWidth = document.getElementById("languageWidth").value;
    var popUpAlerts = document.getElementById("popUpAlerts").checked;
    var permanentChanges = document.getElementById("permanentChanges").checked;
    
    // Apply changes based on the selected values
    document.body.style.color = fontColor;
    document.body.style.fontSize = fontSize + "px";
    document.body.style.fontFamily = fontStyle;
    // Additional changes can be applied here based on selected options
    
    if (popUpAlerts) {
      alert("Pop-up alerts enabled!");
    }
    
    if (permanentChanges) {
      // You can add code here to save changes permanently (e.g., to localStorage)
      console.log("Changes saved permanently.");
    }
    
    // Store the changes in local storage
    localStorage.setItem("fontColor", fontColor);
    localStorage.setItem("fontSize", fontSize);
    localStorage.setItem("fontStyle", fontStyle);
    localStorage.setItem("popUpAlerts", popUpAlerts);
    localStorage.setItem("permanentChanges", permanentChanges);
  }
  
  // Function to toggle dark mode
  function toggleDarkMode() {
    var body = document.body;
    body.classList.toggle("dark-mode");
    
    // Store the dark mode preference in local storage
    var darkModeEnabled = body.classList.contains("dark-mode");
    localStorage.setItem("darkModeEnabled", darkModeEnabled);
  }
  
  // Check if dark mode preference is stored in local storage and apply it
  var darkModeEnabled = localStorage.getItem("darkModeEnabled");
  if (darkModeEnabled === "true") {
    document.body.classList.add("dark-mode");
  }
  
  // Check if user settings are stored in local storage and apply them
  var fontColor = localStorage.getItem("fontColor");
  var fontSize = localStorage.getItem("fontSize");
  var fontStyle = localStorage.getItem("fontStyle");
  var popUpAlerts = localStorage.getItem("popUpAlerts");
  var permanentChanges = localStorage.getItem("permanentChanges");
  
  if (fontColor) {
    document.body.style.color = fontColor;
  }
  if (fontSize) {
    document.body.style.fontSize = fontSize + "px";
  }
  if (fontStyle) {
    document.body.style.fontFamily = fontStyle;
  }
  if (popUpAlerts === "true") {
    document.getElementById("popUpAlerts").checked = true;
  }
  if (permanentChanges === "true") {
    document.getElementById("permanentChanges").checked = true;
  }
</script>
