<form id="thresholdForm">
  <label for="thresholdValue">Threshold Value:</label>
  <input type="number" id="thresholdValue" name="thresholdValue" required>
  <label for="thresholdType">Threshold Type:</label>
  <select id="thresholdType" name="thresholdType">
    <option value="minimumTax">Minimum Tax</option>
    <option value="deadlineMonth">Deadline Month</option>
    <option value="minimumRevenue">Minimum Revenue</option>
    <option value="minimumCompanies">Minimum Companies</option>
  </select>
  <button type="submit">Check Threshold</button>
</form>

<div id="result"></div>

<script>
  document.getElementById("thresholdForm").addEventListener("submit", function(event) {
    event.preventDefault();
    var thresholdValue = parseFloat(document.getElementById("thresholdValue").value);
    var thresholdType = document.getElementById("thresholdType").value;
    
    // Dummy data
    var companies = [
      { name: "Company A", totalTax: 500 },
      { name: "Company B", totalTax: 800 },
      { name: "Company C", totalTax: 300 }
    ];
    var totalRevenue = companies.reduce((acc, curr) => acc + curr.totalTax, 0);
    var numCompanies = companies.length;
    var currentMonth = (new Date()).getMonth() + 1;

    var result = document.getElementById("result");
    result.innerHTML = "";

    switch(thresholdType) {
      case "minimumTax":
        var filteredCompanies = companies.filter(company => company.totalTax < thresholdValue);
        if (filteredCompanies.length > 0) {
          result.innerHTML = "<h3>Companies with Total Taxes below Threshold:</h3>";
          filteredCompanies.forEach(company => {
            result.innerHTML += "<p>" + company.name + "</p>";
          });
        } else {
          result.innerHTML = "<p>No companies found below the threshold.</p>";
        }
        break;
      case "deadlineMonth":
        if (currentMonth > thresholdValue) {
          var filteredCompanies = companies.filter(company => company.totalTax < thresholdValue);
          if (filteredCompanies.length > 0) {
            result.innerHTML = "<h3>Companies with Total Taxes below Threshold:</h3>";
            filteredCompanies.forEach(company => {
              result.innerHTML += "<p>" + company.name + "</p>";
            });
          } else {
            result.innerHTML = "<p>No companies found below the threshold.</p>";
          }
        } else {
          result.innerHTML = "<p>Current month has not yet passed the threshold month.</p>";
        }
        break;
      case "minimumRevenue":
        if (totalRevenue >= thresholdValue) {
          result.innerHTML = "<p>Total Revenue exceeds the threshold value.</p>";
        } else {
          result.innerHTML = "<p>Total Revenue does not exceed the threshold value.</p>";
        }
        break;
      case "minimumCompanies":
        var companiesBelowThreshold = companies.filter(company => company.totalTax < thresholdValue).length;
        var companiesNotMeetingThreshold = numCompanies - companiesBelowThreshold;
        result.innerHTML = "<p>Number of companies not meeting the threshold: " + companiesNotMeetingThreshold + "</p>";
        break;
    }
  });
</script>
